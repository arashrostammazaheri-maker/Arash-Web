<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطالعه مقاله | Lets Learn Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>

    <header class="glass-header">
        <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
        <div class="logo-area">
            <a href="index.html" style="text-decoration:none;">
                <h1 class="brand-name">LLH Article</h1>
            </a>
        </div>
        <div class="menu-container">
            <a href="articles.html" class="btn-icon"><i class="fas fa-arrow-left"></i></a>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <div class="glass-card article-full-view">
            <img id="art-img" src="" alt="Article Image" style="width:100%; border-radius:10px; margin-bottom:20px; max-height:400px; object-fit:cover;">
            <h1 id="art-title" style="margin-bottom:20px; color:var(--highlight);">عنوان مقاله</h1>
            <div class="article-meta" style="margin-bottom:20px; color:var(--secondary-color); font-size:0.9rem;">
                <span><i class="fas fa-user"></i> نویسنده: آرش</span> | 
                <span><i class="fas fa-calendar"></i> 2026</span>
            </div>
            <p id="art-content" style="line-height:1.8; text-align:justify;">
                در حال بارگذاری متن مقاله...
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const isLocal = urlParams.get('local');

        const staticArticles = {
            1: {
                title: "بررسی کارت گرافیک RTX 5090",
                img: "pic1.png",
                text: "کارت گرافیک RTX 5090 پرچمدار جدید انویدیا است که با لیتوگرافی جدید و معماری Blackwell عرضه شده است. این کارت دارای 32 گیگابایت حافظه GDDR7 است و پهنای باندی فراتر از 1.5 ترابایت بر ثانیه ارائه می‌دهد. مصرف انرژی این کارت حدود 500 وات است و برای اجرای بازی‌های 8K طراحی شده است. سیستم خنک‌کننده جدید آن بسیار بزرگتر شده است."
            },
            2: {
                title: "راهنمای خرید CPU در سال 2026",
                img: "pic2.png",
                text: "در سال 2026 انتخاب بین اینتل و AMD سخت‌تر شده است. پردازنده‌های سری Ultra اینتل با مصرف بهینه‌تر وارد بازار شده‌اند و AMD با رایزن‌های سری 9000 قدرت پردازشی را به سطح جدیدی برده است. اگر فقط گیمر هستید، مدل‌های X3D شرکت AMD بهترین گزینه هستند اما برای کارهای ترکیبی اینتل پیشنهاد می‌شود."
            },
            3: {
                title: "تفاوت رم‌های DDR4 و DDR5",
                img: "pic3.png",
                text: "رم‌های DDR5 حالا به بلوغ رسیده‌اند و با سرعت‌های بالای 8000 مگاهرتز در دسترس هستند. تفاوت اصلی در پهنای باند و مدیریت انرژی است. برای سیستم‌های جدید خرید DDR4 دیگر منطقی نیست مگر اینکه بودجه بسیار محدودی داشته باشید که با توجه به بحران رم در جهان به دلیل سرور های هوش مصنوعی و مملکت بسیار خوب و بدون حتی رد پایی از تورم و مسئولین منصف و حلال خور... قیمت رم های DDR5 به شدت بالا رفته است، به طوری که یک رم 32 گیگابایتی DDR5 هم قیمت یک کارت گرافیک میان رده یا حتی بیشتر شده است. پس خرید رم های DDR4 برای بودجه هایی تا 100 میلیون به گزینه ای منطقی تبدیل شده است!"
            }
        };

        if (isLocal) {
            const articles = JSON.parse(localStorage.getItem('articles')) || [];
            const article = articles.find(a => a.id == id);
            if(article) {
                document.getElementById('art-title').innerText = article.title;
                document.getElementById('art-img').src = article.image;
                document.getElementById('art-content').innerText = article.content;
            }
        } else if (staticArticles[id]) {
            document.getElementById('art-title').innerText = staticArticles[id].title;
            document.getElementById('art-img').src = staticArticles[id].img;
            document.getElementById('art-content').innerText = staticArticles[id].text;
        } else {
            document.getElementById('art-title').innerText = "مقاله یافت نشد";
            document.getElementById('art-content').innerText = "";
        }
    </script>
</body>
</html>
