<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابزارها | Lets Learn Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>

    <header class="glass-header">
        <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
        <div class="logo-area">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <img src="logo.png" alt="Logo" class="site-logo">
                <h1 class="brand-name"><span class="highlight">L</span>LH Tools</h1>
            </a>
        </div>
        <div class="menu-container">
            <button id="menu-btn" class="btn-icon"><i class="fas fa-bars"></i></button>
            <nav id="navbar" class="nav-menu hidden-menu">
                <ul>
                    <li><a href="index.html">خانه</a></li>
                    <li><a href="tools.html">ابزارها</a></li>
                    <li><a href="articles.html">مقالات</a></li>
                    <li><a href="admin.html">پنل ادمین</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container" style="margin-top: 50px;">
        <h2 class="section-title">ابزارهای هوشمند</h2>
        <div class="tools-grid">
            <div class="tool-card glass-card">
                <h3><i class="fas fa-bolt"></i> محاسبه‌گر پاور</h3>
                <div class="form-group">
                    <label>پردازنده (CPU):</label>
                    <select id="cpu-select">
                        <option value="0">انتخاب کنید...</option>
                        <option value="125">Intel Core i5-14600K</option>
                        <option value="181">Intel Core i7-14700K</option>
                        <option value="253">Intel Core i9-14900K</option>
                        <option value="125">Intel Core Ultra 9 285K</option>
                        <option value="120">AMD Ryzen 7 7800X3D</option>
                        <option value="170">AMD Ryzen 9 9950X</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>کارت گرافیک (GPU):</label>
                    <select id="gpu-select">
                        <option value="0">انتخاب کنید...</option>
                        <option value="200">NVIDIA RTX 4070</option>
                        <option value="320">NVIDIA RTX 4080</option>
                        <option value="450">NVIDIA RTX 4090</option>
                        <option value="500">NVIDIA RTX 5090</option>
                        <option value="355">AMD RX 7900 XTX</option>
                    </select>
                </div>
                <button onclick="calculatePower()" class="btn-secondary">محاسبه توان</button>
                <div id="power-result" class="result-box"></div>
            </div>

            <div class="tool-card glass-card">
                <h3><i class="fas fa-tachometer-alt"></i> تست گلوگاه</h3>
                <div class="form-group">
                    <label>پردازنده:</label>
                    <select id="bn-cpu">
                        <option value="50">Intel Core i3-12100</option>
                        <option value="85">Intel Core i5-14600K</option>
                        <option value="100">Intel Core i9-14900KS</option>
                        <option value="95">AMD Ryzen 7 7800X3D</option>
                        <option value="98">AMD Ryzen 9 9950X</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>گرافیک:</label>
                    <select id="bn-gpu">
                        <option value="40">RTX 3060</option>
                        <option value="75">RTX 4070 Ti Super</option>
                        <option value="95">RTX 4090</option>
                        <option value="105">RTX 5090</option>
                    </select>
                </div>
                <button onclick="calculateBottleneck()" class="btn-secondary">بررسی گلوگاه</button>
                <div class="progress-wrapper hidden" id="bn-result">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="bn-bar"></div>
                    </div>
                    <p id="bn-text">درصد گلوگاه: 0%</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Lets Learn Hardware.</p>
    </footer>

    <script src="script.js"></script>
    <script src="tools.js"></script>
</body>
</html>
