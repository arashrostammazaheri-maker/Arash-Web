<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل ادمین | Lets Learn Hardware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>

    <header class="glass-header">
        <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
        
        <div class="logo-area">
            <h1 class="brand-name">پنل ادمین</h1>
        </div>

        <div class="menu-container">
            <a href="index.html" class="btn-secondary" style="margin: 0; padding: 8px 15px; display: flex; align-items: center; gap: 5px; text-decoration: none;">
                <i class="fas fa-home"></i> بازگشت
            </a>
        </div>
    </header>

    <div class="container" style="margin-top: 50px; max-width: 800px;">
        
        <div class="glass-card">
            <h3 style="margin-bottom: 20px;">افزودن مقاله جدید</h3>
            <form id="add-article-form">
                <div class="form-group">
                    <label>عنوان مقاله:</label>
                    <input type="text" id="title" placeholder="مثلاً: بررسی RTX 4090" required>
                </div>
                <div class="form-group">
                    <label>لینک تصویر (URL):</label>
                    <input type="text" id="image" placeholder="لینک عکس را اینجا کپی کنید" required>
                </div>
                <div class="form-group">
                    <label>متن کامل:</label>
                    <textarea id="content" rows="5" placeholder="متن کامل مقاله..." required></textarea>
                </div>
                <button type="submit" class="btn-primary">انتشار مقاله</button>
            </form>
        </div>

        <div class="glass-card" style="margin-top: 30px;">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--secondary-color); padding-bottom: 10px;">لیست مقالات منتشر شده</h3>
            <div id="admin-articles-list" style="display: flex; flex-direction: column; gap: 15px;">
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
