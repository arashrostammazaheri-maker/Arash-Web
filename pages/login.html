<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark-mode");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Learn Hardware - Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
</head>
<body style="justify-content: flex-start;">

<header class="glass-header">
    <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
    <div class="logo-area" dir="ltr">
        <a href="../index.html">
            <img src="../assets/img/logo.png" alt="LLH Logo" class="site-logo">
            <h1 class="brand-name" style="margin: 0; padding-left: 8px; display: block;">
                <span class="highlight">L</span>ets&nbsp;<span class="text-purple">L</span>earn&nbsp;<span class="text-orange">H</span>ardware
            </h1>
        </a>
    </div>
    
    <div class="menu-container">
    <button id="menu-btn" class="btn-icon"><i class="fas fa-bars"></i></button>
    <nav id="navbar" class="nav-menu hidden-menu"></nav>
</div>
</header>

<main class="main-wrapper" style="justify-content: center;">
    <div class="glass-card container" style="max-width: 450px;">
        <h2 style="text-align:center; color:var(--highlight); margin-bottom:20px;">ورود به حساب</h2>
        <div id="login-msg" style="text-align:center; font-weight:bold; margin-bottom:15px;"></div>
        
        <form id="login-form">
            <input type="email" id="login-email" class="form-input" placeholder="ایمیل خود را وارد کنید" required>
            
            <div class="password-wrapper" style="margin-bottom: 15px;">
                <input type="password" id="login-pass" class="form-input" placeholder="رمز عبور خود را وارد کنید" required>
                <i class="fas fa-eye" onclick="togglePassword(this)"></i>
            </div>
            
            <button type="submit" class="btn-primary">ورود</button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:0.9rem;">
             حساب ندارید؟ <a href="register.html" style="color:var(--highlight);">ثبت‌نام کنید</a>
        </p>
    </div>
</main>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/script.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pass  = document.getElementById('login-pass').value;
        const msgBox = document.getElementById('login-msg');

        if (email === "Administrator@llh.com") {
            // Super Administrator must supply the correct password — email alone is not sufficient.
            if (pass === "SuperAdmin2026") {
                localStorage.setItem('llh_user_email', email);
                localStorage.setItem('llh_user_name', "مدیر کل سیستم");
                localStorage.setItem('llh_is_admin', 'true');
                window.location.href = 'account.html';
            } else {
                msgBox.style.color = '#ff6b6b';
                msgBox.innerText = 'رمز عبور مدیر کل سیستم نادرست است!';
            }
        } else {
            // Simulates normal user login (in a static version, we accept any email. For demonstration only)
            localStorage.setItem('llh_user_email', email);
            localStorage.setItem('llh_user_name', "کاربر عزیز");
            window.location.href = 'account.html';
        }
    });
</script>
</body>
</html>
