<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark-mode");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Learn Hardware - Account</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
</head>
<body style="justify-content: flex-start;">

<header class="glass-header">
    <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
    <div class="logo-area" dir="ltr">
        <a href="../index.html">
            <img src="../assets/img/logo.png" alt="LLH Logo" class="site-logo">
            <h1 class="brand-name" style="margin: 0; padding-left: 8px; display: block;">
                <span class="highlight">LLH</span> <span class="text-purple">Account</span>
            </h1>
        </a>
    </div>
    
    <div class="menu-container">
    <button id="menu-btn" class="btn-icon"><i class="fas fa-bars"></i></button>
    <nav id="navbar" class="nav-menu hidden-menu"></nav>
</div>
</header>

<main class="main-wrapper" style="justify-content: flex-start;">
    <div class="container" style="display:flex; flex-direction:column; gap:30px; align-items:center; width:100%;">
        <div class="glass-card" style="max-width: 500px; width:100%; text-align:center;">
            <h2 style="color:var(--highlight); margin-bottom: 20px;">مشخصات شما</h2>
            <h3 id="acc-name">درود، کاربر 👋</h3>
            <p style="margin: 10px 0; opacity: 0.9;" id="acc-email">ایمیل: ...</p>
            <p style="font-weight: bold; color: var(--accent-color);" id="acc-role">سطح دسترسی: کاربر عادی</p>
        </div>
        
        <div class="glass-card" style="max-width: 500px; width:100%;">
            <h3 style="text-align:center; color:var(--highlight); margin-bottom: 20px;">تغییر رمز عبور</h3>
            <form id="pass-form">
                <div class="password-wrapper" style="margin-bottom:10px;"><input type="password" class="form-input" placeholder="رمز فعلی" required><i class="fas fa-eye" onclick="togglePassword(this)"></i></div>
                <div class="password-wrapper" style="margin-bottom:10px;"><input type="password" class="form-input" placeholder="رمز جدید" required><i class="fas fa-eye" onclick="togglePassword(this)"></i></div>
                <button type="submit" class="btn-primary">بروزرسانی</button>
            </form>
        </div>
    </div>
</main>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/script.js"></script>
<script>
    requireAuth();
    document.addEventListener('DOMContentLoaded', () => {
        const email = localStorage.getItem('llh_user_email');
        const name = localStorage.getItem('llh_user_name') || 'کاربر';
        const isAdmin = localStorage.getItem('llh_is_admin');
        const isSuperAdmin = email === "Administrator@llh.com" && isAdmin === 'true';

        if(email) {
            document.getElementById('acc-name').innerText = `درود، ${name} 👋`;
            document.getElementById('acc-email').innerText = `ایمیل: ${email}`;

            let roleLabel;
            if (isSuperAdmin)      roleLabel = 'مدیر کل سایت';
            else if (isAdmin === 'true') roleLabel = 'ادمین سایت';
            else                   roleLabel = 'کاربر عادی';

            document.getElementById('acc-role').innerText = `سطح دسترسی: ${roleLabel}`;
        }

        document.getElementById('pass-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("در نسخه دمو تغییر رمز امکان‌پذیر نیست.");
        });
    });
</script>
</body>
</html>
